<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Tuk Tuk Cafe</title>

<link
  href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap"
  rel="stylesheet"
/>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

:root{

  --green:#2d5a27;
  --light:#f5f7f5;
  --border:#dfe6df;
  --danger:#c0392b;
}

*{

  box-sizing:border-box;
  font-family:'Prompt',sans-serif;
}

body{

  margin:0;
  background:var(--light);
  color:#222;
}

.header{

  background:white;
  padding:20px;
  text-align:center;
  border-bottom:1px solid #eee;
}

.header h1{

  margin:0;
  color:var(--green);
  font-size:28px;
}

.container{

  max-width:520px;
  margin:auto;
  padding:16px;
}

.card{

  background:white;
  border-radius:18px;
  padding:20px;
  margin-bottom:16px;
  box-shadow:0 3px 12px rgba(0,0,0,0.05);
}

.form-group{

  margin-bottom:14px;
}

label{

  display:block;
  margin-bottom:6px;
  font-weight:600;
  font-size:14px;
}

input,
select{

  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:16px;
}

button{

  width:100%;
  border:none;
  border-radius:14px;
  background:var(--green);
  color:white;
  padding:16px;
  font-size:20px;
  font-weight:700;
  cursor:pointer;
}

button:disabled{

  opacity:0.5;
}

.status{

  margin-top:12px;
  padding:12px;
  border-radius:12px;
  font-size:14px;
}

.success{

  background:#eaf8ea;
  color:#1f6b1f;
}

.error{

  background:#ffeaea;
  color:var(--danger);
}

.loading{

  text-align:center;
  color:#666;
  padding:10px;
}

.small{

  font-size:13px;
  color:#666;
}

.queue-card{

  border:1px solid #eee;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}

.badge{

  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
}

.badge.wait{

  background:#fff1d6;
  color:#d68910;
}

.badge.ok{

  background:#e8f8e8;
  color:#1e8449;
}

.nav{

  display:flex;
  background:white;
  border-bottom:1px solid #eee;
}

.nav button{

  border-radius:0;
  font-size:14px;
  padding:14px;
  background:white;
  color:#666;
}

.nav button.active{

  color:var(--green);
  border-bottom:3px solid var(--green);
}

.hidden{

  display:none;
}

</style>

</head>

<body>

<div class="header">

  <h1>🌿 Tuk Tuk Cafe</h1>

  <div
    id="profile"
    class="small"
  >
    กำลังเชื่อมต่อ LINE...
  </div>

</div>

<div class="nav">

  <button
    id="nav-book"
    class="active"
    onclick="showPage('booking')"
  >
    จองคิว
  </button>

  <button
    id="nav-queue"
    onclick="showPage('queue')"
  >
    คิวของฉัน
  </button>

</div>

<div class="container">

  <!-- BOOKING PAGE -->

  <div id="page-booking">

    <div class="card">

      <h2>🥤 จองน้ำผักปั่น</h2>

      <form id="bookingForm">

        <div class="form-group">

          <label>ชื่อผู้รับสินค้า</label>

          <input
            type="text"
            id="cust-name"
            required
          />

        </div>

        <div class="form-group">

          <label>เบอร์โทรศัพท์</label>

          <input
            type="tel"
            id="cust-phone"
            required
          />

        </div>

        <div class="form-group">

          <label>เลือกวันรับสินค้า</label>

          <select
            id="res-date"
            required
          >

            <option>
              กำลังโหลด...
            </option>

          </select>

        </div>

        <div class="form-group">

          <label>จำนวนขวด</label>

          <input
            type="number"
            id="res-amount"
            min="1"
            value="1"
            required
          />

        </div>

        <button
          type="submit"
          id="submit-btn"
        >
          ยืนยันการจอง
        </button>

      </form>

      <div id="msg"></div>

    </div>

  </div>

  <!-- QUEUE PAGE -->

  <div
    id="page-queue"
    class="hidden"
  >

    <div class="card">

      <h2>📋 คิวของฉัน</h2>

      <div id="queue-list">

        <div class="loading">
          กำลังโหลด...
        </div>

      </div>

    </div>

  </div>

</div>

<script>

/****************************************
 * CONFIG
 ****************************************/

const LIFF_ID =
'YOUR_LIFF_ID';

const BACKEND_URL =
'https://script.google.com/macros/s/AKfycbyqeyb1AcBu4Z8_YjIVN9zIwuWCX2WG7A50ooTZmlPUhsIaDdlSKoTauIDSUI-P/exec';

/****************************************
 * GLOBAL
 ****************************************/

let USER_UID = '';

let CONFIG_DATES = [];

/****************************************
 * START
 ****************************************/

document.addEventListener(

  'DOMContentLoaded',

  async function(){

    await initLiff();

    await loadDates();
  }
);

/****************************************
 * LIFF
 ****************************************/

async function initLiff(){

  try{

    await liff.init({

      liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){

      liff.login();

      return;
    }

    const profile =
      await liff.getProfile();

    USER_UID =
      profile.userId;

    document
      .getElementById('profile')
      .innerText =
      '👤 ' + profile.displayName;

  }catch(err){

    console.error(err);

    document
      .getElementById('profile')
      .innerText =
      '❌ LIFF ERROR';
  }
}

/****************************************
 * API
 ****************************************/

async function api(data){

  const response =
    await fetch(

      BACKEND_URL,

      {

        method:'POST',

        mode:'cors',

        headers:{

          'Content-Type':
          'application/x-www-form-urlencoded'
        },

        body:new URLSearchParams(data)
      }
    );

  return await response.json();
}

/****************************************
 * LOAD DATES
 ****************************************/

async function loadDates(){

  try{

    const result =
      await api({

        action:'getDates'
      });

    const select =
      document.getElementById(
        'res-date'
      );

    select.innerHTML = '';

    if(
      result.success &&
      result.dates.length > 0
    ){

      CONFIG_DATES =
        result.dates;

      result.dates.forEach(d=>{

        const opt =
          document.createElement(
            'option'
          );

        opt.value =
          d.value;

        opt.innerText =
          d.text;

        opt.dataset.limit =
          d.limitPerPerson;

        opt.dataset.full =
          d.isFull;

        select.appendChild(opt);
      });

      updateLimit();

    }else{

      select.innerHTML =
      '<option>ไม่มีวันเปิดจอง</option>';
    }

  }catch(err){

    console.error(err);
  }
}

/****************************************
 * DYNAMIC LIMIT
 ****************************************/

document
.getElementById('res-date')
.addEventListener(

  'change',

  updateLimit
);

function updateLimit(){

  const select =
    document.getElementById(
      'res-date'
    );

  const amount =
    document.getElementById(
      'res-amount'
    );

  const btn =
    document.getElementById(
      'submit-btn'
    );

  const option =
    select.options[
      select.selectedIndex
    ];

  const limit =
    Number(
      option.dataset.limit || 5
    );

  const isFull =
    option.dataset.full === 'true';

  amount.max = limit;

  if(
    Number(amount.value)
    > limit
  ){

    amount.value = limit;
  }

  if(isFull){

    btn.innerText =
      'ลงชื่อสำรองคิว';

  }else{

    btn.innerText =
      'ยืนยันการจอง';
  }
}

/****************************************
 * SAVE BOOKING
 ****************************************/

document
.getElementById('bookingForm')
.addEventListener(

  'submit',

  async function(e){

    e.preventDefault();

    const btn =
      document.getElementById(
        'submit-btn'
      );

    btn.disabled = true;

    btn.innerText =
      'กำลังบันทึก...';

    try{

      const result =
        await api({

          action:'saveBooking',

          uid:USER_UID,

          name:
            document.getElementById(
              'cust-name'
            ).value,

          phone:
            document.getElementById(
              'cust-phone'
            ).value,

          date:
            document.getElementById(
              'res-date'
            ).value,

          amount:
            document.getElementById(
              'res-amount'
            ).value
        });

      if(result.success){

        showMessage(

          `✅ จองสำเร็จ
รหัส: ${result.id}
สถานะ: ${result.status}`,

          true
        );

        loadMyQueue();

      }else{

        showMessage(
          result.error || 'ERROR'
        );
      }

    }catch(err){

      showMessage(err.toString());

    }

    btn.disabled = false;

    updateLimit();
  }
);

/****************************************
 * LOAD QUEUE
 ****************************************/

async function loadMyQueue(){

  const div =
    document.getElementById(
      'queue-list'
    );

  div.innerHTML =
    '<div class="loading">กำลังโหลด...</div>';

  try{

    const result =
      await api({

        action:'getMyQueue',

        uid:USER_UID
      });

    if(
      result.success &&
      result.queue.length > 0
    ){

      div.innerHTML = '';

      result.queue.forEach(q=>{

        const item =
          document.createElement(
            'div'
          );

        item.className =
          'queue-card';

        item.innerHTML =

`
<div>
<b>${q.id}</b>
</div>

<div>
📅 ${q.date}
</div>

<div>
🥤 ${q.amount} ขวด
</div>

<div style="margin-top:8px;">

<span class="badge ${
q.status === 'สำรองคิว'
? 'wait'
: 'ok'
}">

${q.status}

</span>

</div>
`;

        div.appendChild(item);
      });

    }else{

      div.innerHTML =
      '<div class="loading">ยังไม่มีรายการ</div>';
    }

  }catch(err){

    div.innerHTML =
    '<div class="loading">โหลดไม่สำเร็จ</div>';
  }
}

/****************************************
 * PAGE
 ****************************************/

function showPage(page){

  document
    .getElementById(
      'page-booking'
    )
    .classList.add('hidden');

  document
    .getElementById(
      'page-queue'
    )
    .classList.add('hidden');

  document
    .getElementById(
      'nav-book'
    )
    .classList.remove('active');

  document
    .getElementById(
      'nav-queue'
    )
    .classList.remove('active');

  if(page === 'booking'){

    document
      .getElementById(
        'page-booking'
      )
      .classList.remove('hidden');

    document
      .getElementById(
        'nav-book'
      )
      .classList.add('active');

  }else{

    document
      .getElementById(
        'page-queue'
      )
      .classList.remove('hidden');

    document
      .getElementById(
        'nav-queue'
      )
      .classList.add('active');

    loadMyQueue();
  }
}

/****************************************
 * MESSAGE
 ****************************************/

function showMessage(
  text,
  success=false
){

  const div =
    document.getElementById(
      'msg'
    );

  div.className =
    'status ' +
    (success
      ? 'success'
      : 'error');

  div.innerText =
    text;
}

</script>

</body>
</html>
