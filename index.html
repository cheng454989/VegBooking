<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tuk Tuk Cafe</title>
<style>
body{
font-family:sans-serif;
background:#f4f7f3;
padding:15px;
margin:0;
}
.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}
input,select,textarea,button{
width:100%;
padding:14px;
margin-top:8px;
border-radius:10px;
border:1px solid #ccc;
font-size:18px;
box-sizing:border-box;
}
button{
background:#2d5a27;
color:white;
border:none;
font-weight:bold;
}
.status{
padding:10px;
border-radius:10px;
margin-top:10px;
}
.green{
background:#d4edda;
}
.orange{
background:#fff3cd;
}
</style>
</head>
<body>

<div class="card">
<h2>🌱 จองน้ำผักปั่น</h2>

<input id="name" placeholder="ชื่อ">
<input id="phone" placeholder="เบอร์โทร">

<select id="date"></select>
<select id="time"></select>

<input id="amount" type="number" value="1">

<textarea id="note" placeholder="หมายเหตุ"></textarea>

<div id="totalBox"></div>

<button onclick="submitBooking()">
ยืนยันการจอง
</button>
</div>

<div class="card">
<h2>📋 คิวของฉัน</h2>

<button onclick="loadMyBooking()">
โหลดคิวล่าสุด
</button>

<div id="myBooking"></div>
</div>

<script>

const API_URL = 'YOUR_GAS_WEBAPP_URL';
const PRICE = 30;

let openDates = [];

window.onload = ()=>{

loadDates();

const phone = localStorage.getItem('customer_phone');

if(phone){
  loadMyBooking();
}

}

async function api(data){

const res = await fetch(API_URL,{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify(data)
});

return await res.json();

}

async function loadDates(){

const result = await api({
action:'getOpenDates'
});

openDates = result.dates;

const select = document.getElementById('date');

select.innerHTML = '';

result.dates.forEach(d=>{

const opt = document.createElement('option');
opt.value = d.date;
opt.innerText = d.display;

select.appendChild(opt);

});

updateTime();

}

function updateTime(){

const date = document.getElementById('date').value;

const found = openDates.find(x=>x.date==date);

const timeSelect = document.getElementById('time');

if(!found) return;

const slots = found.timeslot.split(',');

timeSelect.innerHTML = '';

slots.forEach(s=>{

const opt = document.createElement('option');
opt.value = s.trim();
opt.innerText = s.trim();

timeSelect.appendChild(opt);

});

}

document.getElementById('date').addEventListener('change',updateTime);

document.getElementById('amount').addEventListener('input',()=>{

const amount = Number(document.getElementById('amount').value);

const total = amount * PRICE;

document.getElementById('totalBox').innerHTML = `
<h3>
ยอดชำระ ${total} บาท
</h3>
`;

});

async function submitBooking(){

const payload = {
action:'createBooking',
name:document.getElementById('name').value,
phone:document.getElementById('phone').value,
date:document.getElementById('date').value,
time:document.getElementById('time').value,
amount:document.getElementById('amount').value,
note:document.getElementById('note').value
};

const result = await api(payload);

if(result.success){

localStorage.setItem('customer_phone',payload.phone);

alert('จองสำเร็จ เลขคิว '+result.bookingId);

loadMyBooking();

}

}

async function loadMyBooking(){

const phone = localStorage.getItem('customer_phone') || document.getElementById('phone').value;

const result = await api({
action:'getBooking',
phone:phone
});

let html = '';

result.rows.forEach(r=>{

html += `
<div class="status green">
<h3>${r.bookingId}</h3>
<div>${r.date}</div>
<div>${r.time}</div>
<div>${r.amount} ขวด</div>
<div>${r.total} บาท</div>
<div>${r.paymentStatus}</div>
</div>
`;

});

document.getElementById('myBooking').innerHTML = html;

}

</script>

</body>
</html>
